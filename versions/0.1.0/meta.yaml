aha_moments:
  - commit: e9a8b6d
    type: data_driven_counterintuition
    summary: Disable stoploss — agent observed every stopped loser eventually reached RSI>65
  - commit: e0492c4
    type: goodhart_flagged
    summary: exit_profit_only=True → 100% win rate via "never realize losses". Kept but tagged regime-risk.
  - commits: [74423c4, 3f7e255, 81cbd11]
    type: goodhart_reversed
    summary: |
      Tight ROI clipping pushed Sharpe to 4.67, 12.4, 18.3 while profit dropped.
      Agent self-identified "Sharpe inversely correlated with profit = gaming signature"
      and retroactively discarded all three, rolling strategy back to 908ea7e.

limitations_known:
  - No benchmark vs buy-and-hold in the oracle (buy-and-hold BTC/ETH over this period was ~+400%, vastly above strategy)
  - Single regime: 2023-2025 was bull market; strategy relies on "positions eventually recover" assumption
  - No out-of-sample / held-out validation in this run
  - 80 trades / 3 years — wide Sharpe confidence interval
  - Agent converged to RSI family; did not explore multi-timeframe, ATR, regime detection, or per-pair customization
